<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập - TRẠM GỬI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="logo">TRẠM GỬI</div>
  </header>

  <main>
    <section class="form-box">
      <h2>Đăng nhập</h2>

      <form id="loginForm">
        <label>Email</label>
        <input id="email" type="email" placeholder="email@example.com" required>

        <label>Mật khẩu</label>
        <input id="password" type="password" placeholder="Mật khẩu" required>

        <button type="submit">Đăng nhập</button>
      </form>

      <p>Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
      <p id="loginMessage"></p>
    </section>
  </main>

  <footer>
    <p>© 2026 TRẠM GỬI</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
